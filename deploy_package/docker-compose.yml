services:
  robdoe-core-node:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: robdoe_sovereign_authority_node
    restart: unless-stopped
    stdin_open: true
    tty: true
    environment:
      - NODE_ENV=production
      - IS_DOCKER_CONTAINER=true
      - WITNESS_PORT=7777
      - HARDWARE_FREQUENCY=40MHz
      - SERIAL_BAUD_RATE=115200
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - C:\SPACE:/workspace
      - C:\SPACE\deploy_package\circulation_macro_015:/workspace/coupled_phase_flow
    ports:
      - "7777:7777"
