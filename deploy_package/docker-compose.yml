services:
  robdoe-core-node:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: robdoe_sovereign_authority_node
    restart: unless-stopped
    stdin_open: true
    tty: true
    environment:
      - NODE_ENV=${NODE_ENV}
      - IS_DOCKER_CONTAINER=${IS_DOCKER_CONTAINER}
      - DOTNET_RUNNING_IN_CONTAINER=${DOTNET_RUNNING_IN_CONTAINER}
      - WITNESS_PORT=${WITNESS_PORT}
      - SERIAL_COM_PORT=${SERIAL_COM_PORT}
      - SERIAL_BAUD_RATE=${SERIAL_BAUD_RATE}
    extra_hosts:
      - "${HOST_GATEWAY_IP}:host-gateway"
    volumes:
      - C:\SPACE:/workspace
    ports:
      - "${WITNESS_PORT}:${WITNESS_PORT}"
