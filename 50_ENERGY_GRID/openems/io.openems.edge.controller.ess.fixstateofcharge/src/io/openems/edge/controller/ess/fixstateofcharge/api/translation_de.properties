ctrlIsInReferenceCycle = Referenzzyklus aktiv – Speicher wird für die Kapazitätserweiterung vorbereitet.
ctrlIsBlockingEss = Der Speicher befindet sich am Ziel-SoC. Laden/Entladen wird vom Controller blockiert, solange eine Fallback-Zeit erreicht oder eine Bedingung, z.B. Kapazitätsänderung, erfüllt ist.