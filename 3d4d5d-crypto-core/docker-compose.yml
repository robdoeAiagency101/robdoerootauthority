version: '3.9'

services:
  crypto-triangle-api:
    build:
      context: .
      dockerfile: Dockerfile
      # Reproducible build args
      args:
        BUILDKIT_INLINE_CACHE: "1"
    container_name: crypto-triangle-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    labels:
      com.robdoe.system: "3d4d5d-crypto-core"
      com.robdoe.version: "1.0.0"
    networks:
      - crypto-net
    # Resource limits for stability
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

networks:
  crypto-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  # For persistent state if needed
  crypto-state:
    driver: local
