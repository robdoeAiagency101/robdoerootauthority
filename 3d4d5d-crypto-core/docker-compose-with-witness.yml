version: '3.9'

services:
  # Crypto Triangle API
  crypto-triangle-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crypto-triangle-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    labels:
      com.robdoe.system: "3d4d5d-crypto-core"
      com.robdoe.version: "1.0.0"
    networks:
      - crypto-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  # Witness Service (robdoe.com simulation)
  witness-service:
    image: python:3.12-slim
    container_name: robdoe-witness
    working_dir: /app
    volumes:
      - ./robdoe_witness.py:/app/robdoe_witness.py:ro
    command: python robdoe_witness.py
    ports:
      - "8001:8001"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    labels:
      com.robdoe.service: "witness"
      com.robdoe.authority: "robdoe.com"
    networks:
      - crypto-net
    depends_on:
      - crypto-triangle-api

networks:
  crypto-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  crypto-state:
    driver: local
