version: '3.9'

services:
  witness-host:
    image: python:3.12-slim
    container_name: witness-host-7777
    ports:
      - "7777:7777"
    volumes:
      - ./witness_host_7777.py:/app/witness_host_7777.py
    working_dir: /app
    command: bash -c "pip install fastapi uvicorn && python witness_host_7777.py"
    networks:
      - witness-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7777/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    environment:
      - AUTHORITY=robdoe.com
      - PORT=7777

  data-acquisition:
    build:
      context: .
      dockerfile: 3d4d5d-crypto-core/Dockerfile
    container_name: data-acq-witness
    ports:
      - "8000:8000"
    depends_on:
      witness-host:
        condition: service_healthy
    environment:
      - WITNESS_HOST=witness-host
      - WITNESS_PORT=7777
      - WITNESS_AUTHORITY=robdoe.com
    networks:
      - witness-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  witness-network:
    driver: bridge
